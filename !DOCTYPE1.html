<!DOCTYPE html>
<html>
<head>
    <title>Flashcard Quiz App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
            margin: 0;

            background: linear-gradient(
                135deg,
                #ff9a9e,
                #fad0c4,
                #fbc2eb,
                #a18cd1,
                #84fab0,
                #8fd3f4
            );

            min-height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.95);
            width: 550px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: #4a148c;
            font-size: 32px;
        }

        .quiz-icons {
            font-size: 40px;
            margin-bottom: 15px;
        }

        #question {
            color: #0d47a1;
            font-size: 24px;
        }

        #answer {
            margin-top: 15px;
            color: #2e7d32;
            font-weight: bold;
            font-size: 20px;
        }

        button {
            margin: 5px;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: #673ab7;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #512da8;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        hr {
            margin: 20px 0;
        }

        .footer {
            color: #4a148c;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>📚 Flashcard Quiz App 🎓</h2>

    <div class="quiz-icons">
        📚 🎓 💡 ❓ 📝 🏆
    </div>

    <h3 id="question"></h3>
    <p id="answer"></p>

    <button onclick="showAnswer()">Show Answer</button>
    <button onclick="previousCard()">Previous</button>
    <button onclick="nextCard()">Next</button>

    <hr>

    <h3>Manage Flashcards</h3>

    <input type="text" id="newQuestion" placeholder="Enter Question">
    <br>

    <input type="text" id="newAnswer" placeholder="Enter Answer">
    <br>

    <button onclick="addCard()">➕ Add</button>
    <button onclick="editCard()">✏ Edit Current</button>
    <button onclick="deleteCard()">🗑 Delete Current</button>

    <hr>

    <div class="footer">
        <h3>🏆 Keep Practicing! 📚</h3>
        <p>Learn • Practice • Remember</p>
    </div>

</div>

<script>

let flashcards = [
    {
        question: "What is HTML?",
        answer: "HTML is used to create web pages."
    },
    {
        question: "What is CSS?",
        answer: "CSS is used for styling web pages."
    },
    {
        question: "What is JavaScript?",
        answer: "JavaScript adds interactivity to websites."
    }
];

let currentIndex = 0;

function displayCard() {
    document.getElementById("question").innerText =
        flashcards[currentIndex].question;

    document.getElementById("answer").innerText = "";
}

function showAnswer() {
    document.getElementById("answer").innerText =
        flashcards[currentIndex].answer;
}

function nextCard() {
    if (currentIndex < flashcards.length - 1) {
        currentIndex++;
        displayCard();
    }
}

function previousCard() {
    if (currentIndex > 0) {
        currentIndex--;
        displayCard();
    }
}

function addCard() {
    let q = document.getElementById("newQuestion").value;
    let a = document.getElementById("newAnswer").value;

    if (q && a) {
        flashcards.push({
            question: q,
            answer: a
        });

        document.getElementById("newQuestion").value = "";
        document.getElementById("newAnswer").value = "";

        alert("Flashcard Added!");
    }
}

function editCard() {
    let q = document.getElementById("newQuestion").value;
    let a = document.getElementById("newAnswer").value;

    if (q && a) {
        flashcards[currentIndex].question = q;
        flashcards[currentIndex].answer = a;

        displayCard();

        alert("Flashcard Updated!");
    }
}

function deleteCard() {
    if (flashcards.length > 1) {
        flashcards.splice(currentIndex, 1);

        if (currentIndex >= flashcards.length) {
            currentIndex--;
        }

        displayCard();

        alert("Flashcard Deleted!");
    }
}

displayCard();

</script>

</body>
</html>
