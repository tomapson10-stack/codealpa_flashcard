```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    padding:20px;
    background:
    linear-gradient(
    135deg,
    #000000,
    #120018,
    #2e004f,
    #5e17eb);
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.header h1{
    font-size:3rem;
    color:#c77dff;
    text-shadow:0 0 15px #c77dff;
}

.header p{
    color:#dddddd;
    margin-top:10px;
}

.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    color:white;
}

.glass h2{
    color:#d8b4fe;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#cccccc;
}

.add-btn{
    background:#8b5cf6;
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    width:100%;
    font-size:16px;
}

.add-btn:hover{
    background:#a855f7;
    box-shadow:0 0 15px #a855f7;
}

.dashboard{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.stat-card{
    background:linear-gradient(
    135deg,
    #4c1d95,
    #7c3aed);
    padding:20px;
    border-radius:18px;
    text-align:center;
    color:white;
}

.stat-card h3{
    font-size:16px;
}

.stat-card p{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#7c3aed;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    color:white;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.delete-btn{
    background:#ff1744;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#d50000;
}

.footer{
    text-align:center;
    color:#c77dff;
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
}

.icon{
    font-size:45px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="icon">💜⚡🏋️⚡💜</div>
    <h1>Fitness Tracker Pro</h1>
    <p>Track Progress • Burn Calories • Stay Consistent</p>
</div>

<div class="glass">

<h2>Add Workout</h2>

<input
type="text"
id="exercise"
placeholder="Exercise Type">

<input
type="number"
id="time"
placeholder="Workout Time (Minutes)">

<input
type="number"
id="calories"
placeholder="Calories Burned">

<button
class="add-btn"
onclick="addWorkout()">
➕ Add Workout
</button>

</div>

<div class="glass">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="stat-card">
<h3>Total Activities</h3>
<p id="totalActivities">0</p>
</div>

<div class="stat-card">
<h3>Total Time</h3>
<p id="totalTime">0</p>
</div>

<div class="stat-card">
<h3>Total Calories</h3>
<p id="totalCalories">0</p>
</div>

</div>

</div>

<div class="glass">

<h2>Workout History</h2>

<table>

<thead>
<tr>
<th>Exercise</th>
<th>Time</th>
<th>Calories</th>
<th>Action</th>
</tr>
</thead>

<tbody id="activityTable">
</tbody>

</table>

</div>

<div class="footer">
🔥 Push Beyond Your Limits 🔥
</div>

</div>

<script>

let activities =
JSON.parse(localStorage.getItem("activities")) || [];

function saveData(){
localStorage.setItem(
"activities",
JSON.stringify(activities)
);
}

function addWorkout(){

let exercise =
document.getElementById("exercise").value;

let time =
parseInt(document.getElementById("time").value) || 0;

let calories =
parseInt(document.getElementById("calories").value) || 0;

if(exercise===""){
alert("Please enter exercise type");
return;
}

activities.push({
exercise,
time,
calories
});

saveData();
displayData();

document.getElementById("exercise").value="";
document.getElementById("time").value="";
document.getElementById("calories").value="";
}

function deleteWorkout(index){

if(confirm("Delete this workout?")){

activities.splice(index,1);

saveData();
displayData();

}
}

function displayData(){

let table =
document.getElementById("activityTable");

table.innerHTML="";

let totalTime=0;
let totalCalories=0;

activities.forEach((activity,index)=>{

totalTime += activity.time;
totalCalories += activity.calories;

table.innerHTML += `
<tr>
<td>${activity.exercise}</td>
<td>${activity.time}</td>
<td>${activity.calories}</td>
<td>
<button
class="delete-btn"
onclick="deleteWorkout(${index})">
Delete
</button>
</td>
</tr>
`;
});

document.getElementById("totalActivities")
.innerText = activities.length;

document.getElementById("totalTime")
.innerText = totalTime;

document.getElementById("totalCalories")
.innerText = totalCalories;
}

displayData();

</script>

</body>
</html>
```
